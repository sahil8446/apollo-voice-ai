# Render blueprint — one-click deploy of API + managed Postgres.
# `render blueprint launch` (or connect the repo in the dashboard) provisions
# both. DATABASE_URL is wired automatically from the database below.
services:
  - type: web
    name: apollo-voice-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health/ready
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: apollo-voice-db
          property: connectionString
      # HMAC signature verification is for Retell's webhook EVENTS, not custom
      # function (tool) calls — tool calls aren't signed with that scheme, so
      # this must stay false for the voice agent's tools to work. Secure tool
      # endpoints with a shared-secret header instead (see docs/architecture.md).
      - key: VERIFY_RETELL_SIGNATURE
        value: "false"
      - key: RETELL_API_KEY
        sync: false          # set in dashboard (secret); used only for webhook events
      - key: ADMIN_API_KEY
        generateValue: true  # Render generates a strong key
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: apollo-voice-db
    plan: free
    postgresMajorVersion: "16"
